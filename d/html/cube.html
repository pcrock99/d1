<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双视魔方 🧊 2D + 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px 12px;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
    color: #e94560;
    text-shadow: 0 0 10px rgba(233,69,96,0.5);
  }
  .subtitle {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 16px;
  }
  .view-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 28px;
    width: 100%;
    max-width: 820px;
    margin-bottom: 18px;
  }
  .scene-3d-wrap {
    position: relative;
    width: 320px;
    height: 320px;
    border-radius: 12px;
    background: #12122a;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    flex-shrink: 0;
    overflow: hidden;
  }
  .scene-3d-wrap canvas { display: block; width: 100% !important; height: 100% !important; }
  .scene-label {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    font-size: 0.7rem; color: rgba(255,255,255,0.35); letter-spacing: 2px;
    text-transform: uppercase; pointer-events: none; user-select: none;
  }
  .cube-net {
    display: grid;
    grid-template-columns: repeat(4, 88px);
    grid-template-rows: repeat(3, 88px);
    gap: 22px;
    justify-content: center;
    flex-shrink: 0;
  }
  .face {
    border-radius: 8px; position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer;
  }
  .face:hover { transform: scale(1.05); box-shadow: 0 0 16px rgba(255,255,255,0.2); }
  .face-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 100%; height: 100%; border-radius: 6px; overflow: hidden;
    gap: 2px; padding: 2px; background: #222;
  }
  .sticker { border-radius: 3px; transition: background-color 0.4s ease; }
  .face-top    { grid-column: 2; grid-row: 1; }
  .face-left   { grid-column: 1; grid-row: 2; }
  .face-front  { grid-column: 2; grid-row: 2; }
  .face-right  { grid-column: 3; grid-row: 2; }
  .face-back   { grid-column: 4; grid-row: 2; }
  .face-bottom { grid-column: 2; grid-row: 3; }
  .face-label {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 0.7rem; font-weight: 600; color: #ddd;
    background: rgba(0,0,0,0.65); padding: 1px 8px; border-radius: 8px;
    white-space: nowrap; letter-spacing: 1px; pointer-events: none;
    backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.08); z-index: 2;
  }
  .face-top .face-label, .face-left .face-label, .face-front .face-label,
  .face-right .face-label, .face-back .face-label { bottom: -16px; }
  .face-bottom .face-label { top: -16px; }
  .color-white   { background: #f0f0f0; }
  .color-yellow  { background: #ffd700; }
  .color-red     { background: #ff0000; }
  .color-orange  { background: #ff8c00; }
  .color-blue    { background: #0044ff; }
  .color-green   { background: #00aa00; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; max-width: 500px; margin-bottom: 12px;
  }
  .btn {
    padding: 8px 18px; border: none; border-radius: 6px;
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s; font-weight: bold;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn-scramble { background: #e94560; color: #fff; }
  .btn-reset    { background: #533483; color: #fff; }
  .btn-solve    { background: #0f3460; color: #fff; }
  .rotate-controls {
    display: flex; flex-direction: column; gap: 6px; align-items: center; margin-bottom: 14px;
  }
  .rot-row { display: flex; gap: 6px; justify-content: center; }
  .rot-btn {
    padding: 6px 14px; border: 1px solid #444; border-radius: 4px;
    background: #16213e; color: #ccc; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; min-width: 50px; text-align: center;
  }
  .rot-btn:hover { background: #0f3460; color: #fff; border-color: #e94560; }
  .rot-btn.prime { color: #e94560; border-color: #e94560; }
  .rot-btn.prime:hover { background: #e94560; color: #fff; }
  .info {
    font-size: 0.72rem; color: #666; text-align: center;
    max-width: 500px; line-height: 1.6;
  }
  .info strong { color: #999; }
  @keyframes flipIn {
    from { opacity: 0; transform: rotateY(90deg); }
    to   { opacity: 1; transform: rotateY(0); }
  }
  .face { animation: flipIn 0.5s ease forwards; }
  @media (max-width: 700px) {
    .view-container { flex-direction: column; align-items: center; gap: 16px; }
    .scene-3d-wrap { width: 280px; height: 280px; }
    .cube-net { grid-template-columns: repeat(4, 72px); grid-template-rows: repeat(3, 72px); gap: 18px; }
    .face-label { font-size: 0.6rem; padding: 0 6px; }
    .face-top .face-label, .face-left .face-label, .face-front .face-label,
    .face-right .face-label, .face-back .face-label { bottom: -14px; }
    .face-bottom .face-label { top: -14px; }
  }
  @media (max-width: 400px) {
    .cube-net { grid-template-columns: repeat(4, 60px); grid-template-rows: repeat(3, 60px); gap: 16px; }
    .rot-btn { min-width: 40px; padding: 5px 8px; font-size: 0.7rem; }
  }
</style>
</head>
<body>

<h1>🧊 双视魔方</h1>
<p class="subtitle">2D 展开图 ↔ 3D 模型实时同步 · 点击小格或旋转按钮操作</p>

<div class="view-container">
  <div class="scene-3d-wrap" id="threeContainer">
    <div class="scene-label">✦ 3D 实时预览 ✦</div>
  </div>
  <div class="cube-net" id="cubeNet"></div>
</div>

<div class="controls">
  <button class="btn btn-scramble" id="btnScramble">🔀 随机打乱</button>
  <button class="btn btn-reset" id="btnReset">🔄 还原</button>
  <button class="btn btn-solve" id="btnSolve">💡 提示</button>
</div>

<div class="rotate-controls">
  <div class="rot-row">
    <button class="rot-btn" id="btnU">U 上</button>
    <button class="rot-btn" id="btnD">D 下</button>
    <button class="rot-btn" id="btnL">L 左</button>
    <button class="rot-btn" id="btnR">R 右</button>
    <button class="rot-btn" id="btnF">F 前</button>
    <button class="rot-btn" id="btnB">B 后</button>
  </div>
  <div class="rot-row">
    <button class="rot-btn prime" id="btnUp">U' 上'</button>
    <button class="rot-btn prime" id="btnDp">D' 下'</button>
    <button class="rot-btn prime" id="btnLp">L' 左'</button>
    <button class="rot-btn prime" id="btnRp">R' 右'</button>
    <button class="rot-btn prime" id="btnFp">F' 前'</button>
    <button class="rot-btn prime" id="btnBp">B' 后'</button>
  </div>
</div>

<p class="info">
  <strong>上=白</strong> · <strong>下=黄</strong> · <strong>前=红</strong> · <strong>后=橙</strong> · <strong>左=蓝</strong> · <strong>右=绿</strong><br>
  点击 2D 面上的小格换色 · 拖拽 3D 模型可旋转视角 · 两视图实时联动 ✨
</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============================================================
//  魔方数据
// ============================================================
const COLORS = ['white','yellow','red','orange','blue','green'];
const COLOR_HEX = {
  white:0xf0f0f0, yellow:0xffd700, red:0xff0000,
  orange:0xff8c00, blue:0x0044ff, green:0x00aa00,
};
const FACE_NAMES = ['top','left','front','right','back','bottom'];
const FACE_LABELS = ['上','左','前','右','后','下'];

let cube = {};
FACE_NAMES.forEach((name, i) => {
  cube[name] = Array.from({length: 9}, () => COLORS[i]);
});

// ============================================================
//  2D 渲染
// ============================================================
function render() {
  const net = document.getElementById('cubeNet');
  net.innerHTML = '';
  FACE_NAMES.forEach((name, fi) => {
    const faceDiv = document.createElement('div');
    faceDiv.className = 'face face-' + name;
    faceDiv.style.animationDelay = (fi * 0.08) + 's';
    const grid = document.createElement('div');
    grid.className = 'face-grid';
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const idx = r * 3 + c;
        const sticker = document.createElement('div');
        sticker.className = 'sticker color-' + cube[name][idx];
        sticker.title = FACE_LABELS[fi] + ' [' + (r+1) + ',' + (c+1) + ']';
        sticker.addEventListener('click', ((f, i) => () => cycleColor(f, i))(name, idx));
        grid.appendChild(sticker);
      }
    }
    const label = document.createElement('span');
    label.className = 'face-label';
    label.textContent = FACE_LABELS[fi];
    faceDiv.appendChild(grid);
    faceDiv.appendChild(label);
    net.appendChild(faceDiv);
  });
  update3D();
}

function cycleColor(face, idx) {
  const ci = COLORS.indexOf(cube[face][idx]);
  cube[face][idx] = COLORS[(ci + 1) % COLORS.length];
  render();
}

// ============================================================
//  旋转核心逻辑 — 12-sticker 精确环
// ============================================================
function rotateGrid(arr) {
  return [arr[6], arr[3], arr[0], arr[7], arr[4], arr[1], arr[8], arr[5], arr[2]];
}

// 每个面的 12-sticker 环，顺时针排列，相邻条目在物理角落处对齐
function getRingPositions(face) {
  const R = {
    // U（从上看顺时针：front → right → back → left）全部 L→R
    top: [
      ['front',0],['front',1],['front',2],
      ['right',0],['right',1],['right',2],
      ['back', 0],['back', 1],['back', 2],
      ['left', 0],['left', 1],['left', 2],
    ],
    // D（从下看顺时针：front → left → back → right）全部 R→L
    bottom: [
      ['front',8],['front',7],['front',6],
      ['left', 8],['left', 7],['left', 6],
      ['back', 8],['back', 7],['back', 6],
      ['right',8],['right',7],['right',6],
    ],
    // F（从前面看顺时针：top → right → bottom → left）
    front: [
      ['top',   6],['top',   7],['top',   8],    // L→R
      ['right', 0],['right', 3],['right', 6],    // T→B
      ['bottom',2],['bottom',1],['bottom',0],    // R→L
      ['left',  8],['left',  5],['left',  2],    // B→T
    ],
    // B（从后面看顺时针：top → right → bottom → left）
    back: [
      ['top',   0],['top',   1],['top',   2],    // L→R
      ['right', 2],['right', 5],['right', 8],    // T→B
      ['bottom',8],['bottom',7],['bottom',6],    // R→L
      ['left',  6],['left',  3],['left',  0],    // B→T
    ],
    // L（从左面看顺时针：top → front → bottom → back）
    left: [
      ['top',   0],['top',   3],['top',   6],    // T→B
      ['front', 0],['front', 3],['front', 6],    // T→B
      ['bottom',0],['bottom',3],['bottom',6],    // T→B
      ['back',  8],['back',  5],['back',  2],    // B→T
    ],
    // R（从右面看顺时针：top → back → bottom → front）
    right: [
      ['top',   8],['top',   5],['top',   2],    // B→T
      ['back',  0],['back',  3],['back',  6],    // T→B
      ['bottom',8],['bottom',5],['bottom',2],    // R→L
      ['front', 8],['front', 5],['front', 2],    // B→T
    ],
  };
  return R[face];
}

function rotateFace(face, clockwise) {
  // 1. 旋转该面自身
  if (clockwise) cube[face] = rotateGrid(cube[face]);
  else cube[face] = rotateGrid(rotateGrid(rotateGrid(cube[face])));
  // 2. 获取环
  const ring = getRingPositions(face);
  // 3. 保存旧值
  const saved = ring.map(([f, idx]) => cube[f][idx]);
  // 4. 写入：90°旋转 = 环中向前移 3 位
  //    顺时针：ring[i] ← saved[(i+9)%12]，即每个值向索引增方向移 3
  for (let i = 0; i < 12; i++) {
    const srcIdx = clockwise ? (i + 9) % 12 : (i + 3) % 12;
    const [f, idx] = ring[i];
    cube[f][idx] = saved[srcIdx];
  }
}

function doRotate(move) {
  const prime = move.endsWith('-prime');
  const face = move.replace('-prime', '');
  rotateFace(face, !prime);
  render();
}

function scramble() {
  const faceKeys = ['top','bottom','front','back','left','right'];
  for (let i = 0; i < 20; i++) {
    const idx = Math.floor(Math.random() * 6);
    const prime = Math.random() > 0.5;
    doRotate(faceKeys[idx] + (prime ? '-prime' : ''));
  }
}

function resetCube() {
  FACE_NAMES.forEach((name, i) => {
    cube[name] = Array.from({length: 9}, () => COLORS[i]);
  });
  render();
}

function solveHint() {
  alert('💡 提示：先对齐中心块颜色，按层还原——底层十字 → 角块 → 中层 → 顶层。加油捏～✨');
}

// ============================================================
//  3D 场景 (Three.js)
// ============================================================
let scene, camera, renderer, controls;
let cubies = [];

function init3D() {
  const container = document.getElementById('threeContainer');
  const w = container.clientWidth || 320;
  const h = container.clientHeight || 320;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x12122a);

  camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  camera.position.set(4.2, 3.2, 4.8);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.rotateSpeed = 0.8;
  controls.minDistance = 3;
  controls.maxDistance = 12;
  controls.target.set(0, 0, 0);

  const ambient = new THREE.AmbientLight(0x404060, 0.5);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 10, 7);
  dirLight.castShadow = true;
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
  fillLight.position.set(-5, 0, 5);
  scene.add(fillLight);
  const rimLight = new THREE.DirectionalLight(0xff8888, 0.2);
  rimLight.position.set(0, -5, -5);
  scene.add(rimLight);

  createCubies();
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
  window.addEventListener('resize', onResize3D);
}

function createCubies() {
  const geo = new THREE.BoxGeometry(0.92, 0.92, 0.92);
  for (let x = -1; x <= 1; x++) {
    for (let y = -1; y <= 1; y++) {
      for (let z = -1; z <= 1; z++) {
        const mats = Array.from({length:6}, () =>
          new THREE.MeshStandardMaterial({color:0x111111, roughness:0.3, metalness:0.05}));
        const mesh = new THREE.Mesh(geo, mats);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        const edges = new THREE.EdgesGeometry(geo);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x000000}));
        mesh.add(line);
        mesh.userData = { x, y, z };
        scene.add(mesh);
        cubies.push(mesh);
      }
    }
  }
}

function update3D() {
  if (!cubies.length) return;
  cubies.forEach(mesh => {
    const { x, y, z } = mesh.userData;
    const mats = mesh.material;
    if (x === 1) {
      const si = (1-y)*3 + (1-z);
      mats[0].color.setHex(COLOR_HEX[cube['right'][si]]);
    } else mats[0].color.setHex(0x111111);
    if (x === -1) {
      const si = (1-y)*3 + (z+1);
      mats[1].color.setHex(COLOR_HEX[cube['left'][si]]);
    } else mats[1].color.setHex(0x111111);
    if (y === 1) {
      const si = (z+1)*3 + (x+1);
      mats[2].color.setHex(COLOR_HEX[cube['top'][si]]);
    } else mats[2].color.setHex(0x111111);
    if (y === -1) {
      const si = (z+1)*3 + (x+1);
      mats[3].color.setHex(COLOR_HEX[cube['bottom'][si]]);
    } else mats[3].color.setHex(0x111111);
    if (z === 1) {
      const si = (1-y)*3 + (x+1);
      mats[4].color.setHex(COLOR_HEX[cube['front'][si]]);
    } else mats[4].color.setHex(0x111111);
    if (z === -1) {
      const si = (1-y)*3 + (1-x);
      mats[5].color.setHex(COLOR_HEX[cube['back'][si]]);
    } else mats[5].color.setHex(0x111111);
  });
}

function onResize3D() {
  const container = document.getElementById('threeContainer');
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (camera && renderer) {
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
}

// ============================================================
//  事件绑定
// ============================================================
document.getElementById('btnScramble').addEventListener('click', scramble);
document.getElementById('btnReset').addEventListener('click', resetCube);
document.getElementById('btnSolve').addEventListener('click', solveHint);

const btnMap = {
  btnU:'top', btnD:'bottom', btnL:'left', btnR:'right', btnF:'front', btnB:'back',
  btnUp:'top-prime', btnDp:'bottom-prime', btnLp:'left-prime',
  btnRp:'right-prime', btnFp:'front-prime', btnBp:'back-prime',
};
Object.entries(btnMap).forEach(([id, move]) => {
  document.getElementById(id).addEventListener('click', () => doRotate(move));
});

// ============================================================
//  启动！
// ============================================================
render();
init3D();
setTimeout(() => update3D(), 100);
</script>

</body>
</html>
