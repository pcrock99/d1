<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维化魔方 🧊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 10px;
    color: #e94560;
    text-shadow: 0 0 10px rgba(233,69,96,0.5);
  }
  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 20px;
  }
  .cube-net {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-template-rows: repeat(3, 80px);
    gap: 4px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .face {
    border-radius: 8px;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }
  .face:hover {
    transform: scale(1.05);
    box-shadow: 0 0 16px rgba(255,255,255,0.2);
  }
  .face-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 100%;
    height: 100%;
    border-radius: 6px;
    overflow: hidden;
    gap: 2px;
    padding: 2px;
    background: #222;
  }
  .sticker {
    border-radius: 3px;
    transition: background-color 0.4s ease;
  }
  .face-top    { grid-column: 2; grid-row: 1; }
  .face-left   { grid-column: 1; grid-row: 2; }
  .face-front  { grid-column: 2; grid-row: 2; }
  .face-right  { grid-column: 3; grid-row: 2; }
  .face-back   { grid-column: 4; grid-row: 2; }
  .face-bottom { grid-column: 2; grid-row: 3; }
  .face-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: #aaa;
    white-space: nowrap;
  }
  .color-white   { background: #f0f0f0; }
  .color-yellow  { background: #ffd700; }
  .color-red     { background: #ff0000; }
  .color-orange  { background: #ff8c00; }
  .color-blue    { background: #0044ff; }
  .color-green   { background: #00aa00; }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 400px;
    margin-bottom: 16px;
  }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn-scramble { background: #e94560; color: #fff; }
  .btn-reset    { background: #533483; color: #fff; }
  .btn-solve    { background: #0f3460; color: #fff; }
  .rotate-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 500px;
    margin-bottom: 16px;
  }
  .rot-btn {
    padding: 6px 12px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #16213e;
    color: #ccc;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .rot-btn:hover { background: #0f3460; color: #fff; }
  .info {
    font-size: 0.75rem;
    color: #666;
    text-align: center;
    max-width: 400px;
    line-height: 1.5;
  }
  @keyframes flipIn {
    from { opacity: 0; transform: rotateY(90deg); }
    to   { opacity: 1; transform: rotateY(0); }
  }
  .face { animation: flipIn 0.5s ease forwards; }
</style>
</head>
<body>

<h1>🧊 二维化魔方</h1>
<p class="subtitle">点击面或旋转按钮来打乱它！</p>

<div class="cube-net" id="cubeNet"></div>

<div class="controls">
  <button class="btn btn-scramble" id="btnScramble">🔀 随机打乱</button>
  <button class="btn btn-reset" id="btnReset">🔄 还原</button>
  <button class="btn btn-solve" id="btnSolve">💡 提示</button>
</div>

<div class="rotate-controls">
  <button class="rot-btn" id="btnU">U (上)</button>
  <button class="rot-btn" id="btnD">D (下)</button>
  <button class="rot-btn" id="btnL">L (左)</button>
  <button class="rot-btn" id="btnR">R (右)</button>
  <button class="rot-btn" id="btnF">F (前)</button>
  <button class="rot-btn" id="btnB">B (后)</button>
  <button class="rot-btn" id="btnUp">U'</button>
  <button class="rot-btn" id="btnDp">D'</button>
  <button class="rot-btn" id="btnLp">L'</button>
  <button class="rot-btn" id="btnRp">R'</button>
  <button class="rot-btn" id="btnFp">F'</button>
  <button class="rot-btn" id="btnBp">B'</button>
</div>

<p class="info">
  上=白  下=黄  前=红  后=橙  左=蓝  右=绿<br>
  点击魔方面上的九个小格也可以手动换色哦～
</p>

<script>
// 魔方状态: 6面, 每面3x3
const COLORS = ['white','yellow','red','orange','blue','green'];
const FACE_NAMES = ['top','left','front','right','back','bottom'];
const FACE_LABELS = ['上','左','前','右','后','下'];

let cube = {};
FACE_NAMES.forEach((name, i) => {
  cube[name] = Array.from({length: 9}, () => COLORS[i]);
});

function render() {
  const net = document.getElementById('cubeNet');
  net.innerHTML = '';
  FACE_NAMES.forEach((name, fi) => {
    const faceDiv = document.createElement('div');
    faceDiv.className = 'face face-' + name;
    faceDiv.style.animationDelay = (fi * 0.08) + 's';

    const grid = document.createElement('div');
    grid.className = 'face-grid';

    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const idx = r * 3 + c;
        const sticker = document.createElement('div');
        sticker.className = 'sticker color-' + cube[name][idx];
        sticker.title = FACE_LABELS[fi] + ' [' + (r+1) + ',' + (c+1) + ']';
        sticker.addEventListener('click', (function(f, i) {
          return function() { cycleColor(f, i); };
        })(name, idx));
        grid.appendChild(sticker);
      }
    }

    const label = document.createElement('span');
    label.className = 'face-label';
    label.textContent = FACE_LABELS[fi];
    faceDiv.appendChild(grid);
    faceDiv.appendChild(label);
    net.appendChild(faceDiv);
  });
}

function cycleColor(face, idx) {
  const ci = COLORS.indexOf(cube[face][idx]);
  cube[face][idx] = COLORS[(ci + 1) % COLORS.length];
  render();
}

// 旋转3x3网格顺时针90度
function rotateGrid(arr) {
  return [arr[6], arr[3], arr[0], arr[7], arr[4], arr[1], arr[8], arr[5], arr[2]];
}

// 魔方旋转的核心逻辑
// 每个面旋转时，不仅旋转自身，还影响4个相邻面的各一条边
// 我们用完整的映射表来保证正确性

// 定义每个面顺时针旋转时，相邻四边的数据来源
// 格式: [[目标面, 目标边], ...] 表示顺时针旋转时:
//   目标边[0] <- 来源边[0]
//   目标边[1] <- 来源边[1]
//   目标边[2] <- 来源边[2]
//   目标边[3] <- 来源边[3]
// 其中source指的是旋转前的值

// 对于每个面，定义其四条边（按顺时针顺序）
// 边定义: top=row0(从左到右), right=col2(从上到下), bottom=row2(从右到左), left=col0(从下到上)
// 这样定义保证顺时针遍历时方向一致

function rotateFace(face, clockwise) {
  // 旋转该面自身
  if (clockwise) {
    cube[face] = rotateGrid(cube[face]);
  } else {
    cube[face] = rotateGrid(rotateGrid(rotateGrid(cube[face])));
  }

  // 获取旋转环
  const ring = getRotationRing(face);
  if (!ring) return;

  // 保存旋转前的四边值
  const saved = [];
  for (let i = 0; i < 4; i++) {
    const [f, side] = ring[i];
    saved.push(getEdge(cube[f], side));
  }

  // 写入: 顺时针时，第i条边获得第(i-1)条边的值
  //       逆时针时，第i条边获得第(i+1)条边的值
  for (let i = 0; i < 4; i++) {
    const [dstF, dstSide] = ring[i];
    let srcIdx;
    if (clockwise) {
      srcIdx = (i + 3) % 4; // 逆时针取，即前一条
    } else {
      srcIdx = (i + 1) % 4; // 顺时针取，即后一条
    }
    setEdge(cube[dstF], dstSide, saved[srcIdx]);
  }
}

// 获取一条边的3个颜色
// edge: 'top'(从左到右), 'right'(从上到下), 'bottom'(从右到左), 'left'(从下到上)
function getEdge(arr, edge) {
  switch(edge) {
    case 'top':    return [arr[0], arr[1], arr[2]];         // row 0, L->R
    case 'right':  return [arr[2], arr[5], arr[8]];         // col 2, T->B
    case 'bottom': return [arr[8], arr[7], arr[6]];         // row 2, R->L
    case 'left':   return [arr[6], arr[3], arr[0]];         // col 0, B->T
  }
}

// 写入一条边
function setEdge(arr, edge, vals) {
  switch(edge) {
    case 'top':    arr[0]=vals[0]; arr[1]=vals[1]; arr[2]=vals[2]; break;
    case 'right':  arr[2]=vals[0]; arr[5]=vals[1]; arr[8]=vals[2]; break;
    case 'bottom': arr[8]=vals[0]; arr[7]=vals[1]; arr[6]=vals[2]; break;
    case 'left':   arr[6]=vals[0]; arr[3]=vals[1]; arr[0]=vals[2]; break;
  }
}

// 获取旋转环: 对于每个面，按顺时针方向列出4个相邻面及其接触的边
// 这个环的定义必须使得顺时针旋转时，每条边从"上一条边"接收值
function getRotationRing(face) {
  switch(face) {
    case 'top':
      // U顺时针: front-top <- right-left <- back-bottom(reverse) <- left-right
      // 顺时针遍历环: front(top), right(left), back(bottom), left(right)
      return [
        ['front', 'top'],
        ['right', 'left'],
        ['back',  'bottom'],
        ['left',  'right'],
      ];
    case 'bottom':
      // D顺时针: left-bottom <- back-top(reverse) <- right-top <- front-bottom
      return [
        ['left',  'bottom'],
        ['back',  'top'],
        ['right', 'top'],
        ['front', 'bottom'],
      ];
    case 'front':
      // F顺时针: top-bottom(reverse) <- left-right <- bottom-top <- right-left
      return [
        ['top',    'bottom'],
        ['left',   'right'],
        ['bottom', 'top'],
        ['right',  'left'],
      ];
    case 'back':
      // B顺时针: right-right <- top-bottom(reverse) <- left-left <- bottom-top(reverse)
      return [
        ['right',  'right'],
        ['top',    'bottom'],
        ['left',   'right'],
        ['bottom', 'top'],
      ];
    case 'left':
      // L顺时针: top-left(reverse) <- back-right <- bottom-left <- front-left
      return [
        ['top',    'left'],
        ['back',   'right'],
        ['bottom', 'left'],
        ['front',  'left'],
      ];
    case 'right':
      // R顺时针: front-right <- top-right(reverse) <- back-left <- bottom-right
      return [
        ['front',  'right'],
        ['top',    'right'],
        ['back',   'left'],
        ['bottom', 'right'],
      ];
  }
  return null;
}

function doRotate(move) {
  const prime = move.endsWith('-prime');
  const face = move.replace('-prime', '');
  rotateFace(face, !prime);
  render();
}

function scramble() {
  const faceKeys = ['top','bottom','front','back','left','right'];
  for (let i = 0; i < 20; i++) {
    const idx = Math.floor(Math.random() * 6);
    const prime = Math.random() > 0.5;
    doRotate(faceKeys[idx] + (prime ? '-prime' : ''));
  }
}

function resetCube() {
  FACE_NAMES.forEach((name, i) => {
    cube[name] = Array.from({length: 9}, () => COLORS[i]);
  });
  render();
}

function solveHint() {
  alert('💡 提示：先从中心块确定各面颜色，然后逐层还原——先做底层十字，再填角块，接着中层，最后顶层！加油捏～✨');
}

// 绑定按钮事件
document.getElementById('btnScramble').addEventListener('click', scramble);
document.getElementById('btnReset').addEventListener('click', resetCube);
document.getElementById('btnSolve').addEventListener('click', solveHint);

document.getElementById('btnU').addEventListener('click', () => doRotate('top'));
document.getElementById('btnD').addEventListener('click', () => doRotate('bottom'));
document.getElementById('btnL').addEventListener('click', () => doRotate('left'));
document.getElementById('btnR').addEventListener('click', () => doRotate('right'));
document.getElementById('btnF').addEventListener('click', () => doRotate('front'));
document.getElementById('btnB').addEventListener('click', () => doRotate('back'));

document.getElementById('btnUp').addEventListener('click', () => doRotate('top-prime'));
document.getElementById('btnDp').addEventListener('click', () => doRotate('bottom-prime'));
document.getElementById('btnLp').addEventListener('click', () => doRotate('left-prime'));
document.getElementById('btnRp').addEventListener('click', () => doRotate('right-prime'));
document.getElementById('btnFp').addEventListener('click', () => doRotate('front-prime'));
document.getElementById('btnBp').addEventListener('click', () => doRotate('back-prime'));

// 初始化
render();
</script>

</body>
</html>
