<!DOCTYPE html>
<html lang="zh-cmn-Hans">
<head>
<meta charset="utf-8">
<title>Figlet - ASCII 艺术字生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;padding:24px;max-width:960px;margin:0 auto}
h1{font-size:22px;margin-bottom:4px}
.sub{color:#8b949e;font-size:13px;margin-bottom:20px}
.ctrl{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em}
.field input{background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:9px 12px;font-size:14px;outline:none;min-width:200px;flex:2}
.field input:focus{border-color:#58a6ff}
.field select{background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:9px 12px;font-size:14px;outline:none;min-width:160px;flex:1;cursor:pointer}
.field select:focus{border-color:#58a6ff}
.field select option{background:#161b22;color:#e6edf3}
.btn{padding:9px 18px;border-radius:6px;border:1px solid #30363d;background:#161b22;color:#e6edf3;cursor:pointer;font-size:13px}
.btn.primary{background:#58a6ff;color:#0d1117;border-color:#58a6ff}
#log{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-family:monospace;font-size:11px;white-space:pre-wrap;max-height:150px;overflow:auto;margin-bottom:12px;color:#8b949e}
#out{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;font-family:monospace;font-size:12px;line-height:1.1;overflow:auto;min-height:250px;user-select:all;white-space:pre}
.stats{display:flex;gap:16px;font-size:12px;color:#8b949e;margin-bottom:8px}
</style>
</head>
<body>
<h1>✦ Figlet</h1>
<div class="sub">全自包含 — 无网络依赖</div>

<div class="ctrl">
  <div class="field" style="flex:2">
    <label for="txt">输入文字</label>
    <input type="text" id="txt" value="Hello World" spellcheck="false">
  </div>
  <div class="field" style="flex:1">
    <label for="sel">字体</label>
    <select id="sel"></select>
  </div>
  <button class="btn primary" id="goBtn">▶ 渲染</button>
  <button class="btn" id="cpBtn">复制</button>
</div>

<div class="stats">
  <span>字体: <span id="fontCount">0</span> 种</span>
  <span>字符: <span id="charCount">0</span></span>
  <span>行: <span id="lineCount">0</span></span>
</div>

<div id="log">加载中...</div>
<pre id="out"></pre>

  });
  var idx = FONT_NAMES.indexOf('Standard');
  if (idx >= 0) sel.selectedIndex = idx;
  fontCount.textContent = FONT_NAMES.length;
  addLog('6. dropdown ready');

  function doRender() {
    var text = txt.value.trim();
    if (!text) { out.textContent = '请输入文字'; return; }
    var fontName = sel.value;
    if (!fontName) { out.textContent = '请选字体'; return; }
    addLog('R: "' + text + '" font=' + fontName);
    figlet(text, { font: fontName }, function(err, result) {
      if (err) {
        addLog('ERR: ' + err.message);
        out.textContent = err.message;
        return;
      }
      if (!result) {
        out.textContent = '(empty)';
        return;
      }
      out.textContent = result;
      charCount.textContent = result.length;
      lineCount.textContent = result.split('\n').filter(function(l) { return l.trim(); }).length;
      addLog('OK: ' + result.length + ' chars');
    });
  }

  document.getElementById('goBtn').onclick = doRender;
  sel.onchange = doRender;
  txt.onkeydown = function(e) { if (e.key === 'Enter') doRender(); };

  document.getElementById('cpBtn').onclick = function() {
    var t = out.textContent;
    if (!t) return;
    var ta = document.createElement('textarea');
    ta.value = t; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  };

  addLog('7. rendering...');
  doRender();
  addLog('Done.');
